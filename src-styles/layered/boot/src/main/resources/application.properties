# Nova Platform Quarkus application properties (Layered variant).
quarkus.application.name=__ARTIFACT__
quarkus.http.port=8080

# Notifications extension — kebab-case property convention (ADR-001).
nova.notifications.enabled=true
nova.notifications.email.enabled=true
nova.notifications.email.provider=sendgrid
nova.notifications.email.from-address=no-reply@example.test
nova.notifications.sms.enabled=false
nova.notifications.push.enabled=false
nova.notifications.slack.enabled=false
nova.notifications.slack.webhook-url=https://example.test/PLACEHOLDER

