# Nova Platform service — generated from the service archetype.
# HTTP
quarkus.http.port=8080
quarkus.http.root-path=/api

# Application info
quarkus.application.name=__ARTIFACT__

# Health (SmallRye)
quarkus.smallrye-health.root-path=/health

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."__PACKAGE__".level=DEBUG