quarkus.http.port=8080
quarkus.http.test-port=8081

# Nova Platform notifications adapter (wired by nova-notifications-quarkus-extension).
# Each channel uses kebab-case properties under nova.notifications.*. The Spring
# Boot starter and Micronaut module follow the same convention for cross-framework
# consistency. The SmallRye @ConfigMapping in the extension uses KEBAB_CASE naming.
nova.notifications.enabled=true
nova.notifications.email.provider=sendgrid
nova.notifications.email.api-key=${SENDGRID_API_KEY:test-api-key-demo}
nova.notifications.email.default-sender=no-reply@example.com
nova.notifications.resilience.max-attempts=1

# SMS / Push / Slack channels are not used by this template but the extension
# declares their properties as REQUIRED. Provide placeholder values so the
# Quarkus bean wire-up succeeds. Replace with real credentials in production.
nova.notifications.sms.provider=twilio
nova.notifications.sms.account-sid=ACdemo-placeholder
nova.notifications.sms.auth-token=placeholder-token
nova.notifications.sms.from-number=+15555550100
nova.notifications.push.provider=firebase
nova.notifications.push.project-id=demo-project-id
nova.notifications.push.server-key=demo-server-key
nova.notifications.slack.default-webhook-url=https://example.test/PLACEHOLDER

quarkus.log.level=INFO