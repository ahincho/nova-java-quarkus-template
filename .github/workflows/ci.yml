name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-style:
    name: ${{ matrix.style }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - style: layered
            package: com.example.layered
            groupId: com.example.layered
            artifactId: layered-service
          - style: hexagonal
            package: com.example.hexagonal
            groupId: com.example.hexagonal
            artifactId: hexagonal-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle (cache wrapper)
        uses: gradle/actions/setup-gradle@v4

      - name: Verify template files
        run: |
          ls -la
          ls -la src-styles/${{ matrix.style }}/

      - name: Rename to example coordinates (${{ matrix.style }})
        run: |
          chmod +x gradlew
          ./gradlew rename \
              -PgroupId=${{ matrix.groupId }} \
              -PartifactId=${{ matrix.artifactId }} \
              -Ppackage=${{ matrix.package }} \
              -Pstyle=${{ matrix.style }}
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}

      - name: Build + Test (${{ matrix.style }})
        run: ./gradlew check
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}

      - name: Build Quarkus Uber-Jar (${{ matrix.style }})
        run: ./gradlew :boot:quarkusBuild
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}

      - name: Report style
        if: always()
        run: |
          echo "### Style: ${{ matrix.style }}" >> $GITHUB_STEP_SUMMARY
          echo "Package: \`${{ matrix.package }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`${{ matrix.artifactId }}\`" >> $GITHUB_STEP_SUMMARY