name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Self-test the template: simulate the post-clone flow by running
# `gradle rename` with example coordinates, then `gradle build` and
# `gradle :boot:test` to verify the renamed project actually compiles
# and the @QuarkusTest boots successfully.
jobs:
  verify-template:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Nova PAT (cross-repo reads)
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}
        run: |
          mkdir -p ~/.gradle
          if [ -n "$NOVA_RELEASE_PAT" ]; then
            echo "NOVA_RELEASE_PAT is available for GitHub Packages reads"
          else
            echo "::warning::NOVA_RELEASE_PAT not configured; cross-repo reads will fail"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run rename with example coordinates
        run: |
          ./gradlew rename \
            -PgroupId=com.example \
            -PartifactId=my-service \
            -Ppackage=com.example.my
          echo "----- after rename: -----"
          grep -E "^(group|artifactId|version)" gradle.properties || true
          # The rename task only rewrites file CONTENTS, not the source folder
          # structure (the source folder still contains the literal __PACKAGE__
          # segment so projects can re-run rename without re-cloning).
          head -3 shared/src/main/java/__PACKAGE__/shared/domain/AggregateId.java

      - name: Build (compile + test)
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}
        run: ./gradlew check --no-daemon

      - name: Quarkus build (fast-jar)
        env:
          NOVA_RELEASE_PAT: ${{ secrets.NOVA_RELEASE_PAT }}
        run: ./gradlew :boot:quarkusBuild --no-daemon